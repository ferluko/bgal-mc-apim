---
apiVersion: v1
kind: Namespace
metadata:
  name: network-perf-test
  labels:
    purpose: network-performance-testing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-target
  namespace: network-perf-test
  labels:
    app: perf-target
spec:
  replicas: 3
  selector:
    matchLabels:
      app: perf-target
  template:
    metadata:
      labels:
        app: perf-target
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: perf-target
            topologyKey: kubernetes.io/hostname
      containers:
      - name: echo-server
        image: ealen/echo-server:0.9.2
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: 500m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: perf-target-clusterip
  namespace: network-perf-test
  labels:
    app: perf-target
spec:
  type: ClusterIP
  selector:
    app: perf-target
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: perf-target-nodeport
  namespace: network-perf-test
  labels:
    app: perf-target
spec:
  type: NodePort
  selector:
    app: perf-target
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: perf-target-headless
  namespace: network-perf-test
  labels:
    app: perf-target
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: perf-target
  ports:
  - port: 8080
    targetPort: 8080
    name: http
