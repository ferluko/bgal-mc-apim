---
apiVersion: v1
kind: Pod
metadata:
  name: netperf-server
  namespace: network-perf-test
  labels:
    app: netperf-server
    role: server
spec:
  containers:
  - name: netperf
    image: networkstatic/netperf:latest
    command: ["netserver", "-D"]
    ports:
    - containerPort: 12865
      name: netperf
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 512Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: netperf-client
  namespace: network-perf-test
  labels:
    app: netperf-client
    role: client
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: netperf-server
        topologyKey: kubernetes.io/hostname
  containers:
  - name: netperf
    image: networkstatic/netperf:latest
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 512Mi
