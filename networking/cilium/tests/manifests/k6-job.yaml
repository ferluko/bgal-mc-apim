---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: network-perf-test
data:
  latency-test.js: |
    # Este ConfigMap se genera dinámicamente por el script run-tests.sh
    # con el contenido de k6/latency-test.js
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k6-results
  namespace: network-perf-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-latency-test
  namespace: network-perf-test
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: k6-runner
    spec:
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6:0.49.0
        command:
        - k6
        - run
        - --out
        - json=/results/output.json
        - /scripts/latency-test.js
        env:
        - name: POD_IP_SAME_NODE
          value: "PLACEHOLDER_POD_IP_SAME_NODE"
        - name: POD_IP_DIFF_NODE
          value: "PLACEHOLDER_POD_IP_DIFF_NODE"
        - name: SERVICE_CLUSTERIP
          value: "perf-target-clusterip.network-perf-test.svc"
        - name: NODE_IP
          value: "PLACEHOLDER_NODE_IP"
        - name: NODE_PORT
          value: "30080"
        - name: CNI_TYPE
          value: "PLACEHOLDER_CNI_TYPE"
        - name: TARGET_PORT
          value: "8080"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: results
          mountPath: /results
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
      volumes:
      - name: scripts
        configMap:
          name: k6-scripts
      - name: results
        persistentVolumeClaim:
          claimName: k6-results
