# PVC para pesos del modelo GLM-4.7-Flash (carga por sneakernet/USB en air-gapped).
# Ajustar storageClassName según el cluster (VMware: thin, gp3-csi, etc.).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glm-4-7-flash-pvc
  namespace: vllm-models
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ""   # rellenar: thin, gp3-csi, o la StorageClass del cluster
