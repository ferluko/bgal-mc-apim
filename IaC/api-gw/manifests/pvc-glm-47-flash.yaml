# PVC para pesos del modelo GLM-4.7-Flash (opcional; vllm-glm-47-flash usa model-reconstruct-pvc).
# Mismo esquema RWX (CephFS) que model-reconstruct-pvc por si se usa un PVC dedicado.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glm-4-7-flash-pvc
  namespace: test-sre
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: ocs-storagecluster-cephfs
